<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>프로필 제작</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Jua',sans-serif;
}
body{
margin:0;
min-height:100vh;
color:#5c5248;
text-align:center;
overflow-x:hidden;

/* 🔥 진짜 대리석 이미지 */
background:url("https://i.imgur.com/BD8E95C.jpeg");
background-size:cover;
background-position:center;
background-attachment:fixed;
position:relative;
}

/* 💎 밝기 + 고급톤 필터 */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(
rgba(255,255,255,0.75),
rgba(240,230,220,0.6)
);

pointer-events:none;
}
.title {
    font-size: 46px;
    margin-top: 50px;
    color: #a38b85; 
    text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
    letter-spacing: 3px;
}
.btn{
display:block;
width:280px;
margin:20px auto;
padding:16px;

border-radius:40px;
border:1px solid rgba(255,255,255,0.6);

background:linear-gradient(145deg,#ffffff,#eaeaea);
color:#6b5c55;

font-size:18px;
font-weight:bold;

cursor:pointer;
transition:0.3s;

box-shadow:
8px 8px 20px rgba(0,0,0,0.08),
-8px -8px 20px rgba(255,255,255,0.9);
}

.btn:hover{
transform:translateY(-4px);
box-shadow:
0 10px 25px rgba(0,0,0,0.15),
0 0 15px rgba(255,122,200,0.3);
}

.btn:active{
transform:scale(0.98);
box-shadow:
inset 3px 3px 10px rgba(0,0,0,0.1),
inset -3px -3px 10px rgba(255,255,255,0.8);
}
.backBtn{
position:absolute;
top:15px;
left:15px;

padding:6px 14px;
font-size:13px;

border-radius:20px;
border:none;

background:linear-gradient(145deg,#f5eee6,#e6dbcd);
color:#6b5c55;

cursor:pointer;

box-shadow:
3px 3px 8px rgba(0,0,0,0.1),
-3px -3px 8px rgba(255,255,255,0.9);

z-index:10;
}
.adminBtn{
position:fixed;
top:20px;
right:20px;

width:55px;
height:55px;

border-radius:50%;
border:none;

background:linear-gradient(145deg,#f5eee6,#e6dbcd);

display:flex;
justify-content:center;
align-items:center;

cursor:pointer;

box-shadow:
4px 4px 12px rgba(0,0,0,0.15),
-4px -4px 12px rgba(255,255,255,0.9);

z-index:100;
transition:0.3s;
}

.adminBtn img{
width:26px;
height:26px;
opacity:0.8;
}

.adminBtn:hover{
transform:scale(1.1) rotate(10deg);
box-shadow:
0 0 20px rgba(255,122,200,0.5);
}

.adminBtn:active{
transform:scale(0.95);
}
.page{
display:none;
padding:30px;
}

.active{
display:block;
}

.card{
position:relative;

background:rgba(255,248,240,0.7);
backdrop-filter:blur(10px);

padding:35px;
border-radius:30px;
margin:30px auto;
max-width:520px;

border:1px solid rgba(255,255,255,0.6);

box-shadow:
0 15px 40px rgba(0,0,0,0.08),
inset 0 0 20px rgba(255,255,255,0.5);

transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:
0 25px 60px rgba(0,0,0,0.15),
0 0 20px rgba(255,122,200,0.2);
}
.card::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border-radius:25px;

background:
linear-gradient(120deg,transparent 40%,rgba(255,255,255,0.4),transparent 60%);

opacity:0.3;
pointer-events:none;
}
input, select, textarea {
    width: 85%;
    padding: 14px;
    margin: 12px;
    border-radius: 15px;
    border: none;
    background: #f0f0f0;
    box-shadow: 
        inset 4px 4px 8px #d1d1d1, 
        inset -4px -4px 8px #ffffff;
    outline: none;
}
input:focus,
textarea:focus,
select:focus{
outline:none;
box-shadow:
0 0 10px #ff7ac8,
inset 0 0 10px rgba(0,0,0,0.6);
}
.colors{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.color{
width:40px;
height:40px;
margin:6px;
border-radius:10px;
cursor:pointer;
border:2px solid white;
}

.order{
background:linear-gradient(145deg,#ffffff,#f3efe9);
padding:15px;   /* 🔥 줄임 */
border-radius:20px;
margin:10px auto;
max-width:420px;   /* 🔥 줄임 */

border:1px solid #e5dfd6;

box-shadow:
4px 4px 10px rgba(0,0,0,0.08),
-4px -4px 10px rgba(255,255,255,0.9);

transition:0.3s;
font-size:14px; /* 🔥 글씨 살짝 줄임 */
}
.order .btn{
width:160px;
padding:10px;
font-size:14px;
margin-top:10px;
}
#admin{
color:#555;
}
.order:hover{
transform:translateY(-3px);
box-shadow:
inset 3px 3px 8px rgba(0,0,0,0.05),
inset -3px -3px 8px rgba(255,255,255,0.9);
}

.preview img,video{
max-width:200px;
margin-top:10px;
border-radius:10px;
}

#loading{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:999;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:22px;
}

.loader{
width:60px;
height:60px;
border:6px solid #ffffff33;
border-top:6px solid #ff7ac8;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}
.gallery{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
}

.gallery img{
width:95px;
height:95px;
border-radius:18px;

object-fit:cover;

box-shadow:
0 8px 20px rgba(0,0,0,0.1);

transition:0.3s;
}

.gallery img:hover{
transform:scale(1.1);
box-shadow:
0 10px 25px rgba(0,0,0,0.2),
0 0 15px rgba(255,122,200,0.4);
}
.frame{
position:fixed;
top:10px;
left:10px;
right:10px;
bottom:10px;
border:2px solid rgba(255,255,255,0.15);
border-radius:30px;
pointer-events:none;
box-shadow:
0 0 40px rgba(255,122,200,0.3),
inset 0 0 30px rgba(255,255,255,0.05);
}
.color.selected{
transform:scale(1.2);
box-shadow:
0 0 10px #ff7ac8,
0 0 25px #ff7ac8,
0 0 40px rgba(255,122,200,0.7);
border:2px solid #fff;
}
</style>
</head>

<body>
<div class="frame"></div>
<div id="loading">
<div class="loader"></div>
잠시만 기다려주세요...
</div>

<div id="main" class="page active">

<h1 class="title">프로필 제작</h1>

<button class="btn" onclick="page('make')">
프로필 만들러가기
</button>

<button class="btn" onclick="page('price')">
가격 및 모음집
</button>
<button class="adminBtn" onclick="adminLogin()">
<img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png">
</button>
</div>
<div id="price" class="page">

<div class="card">
<button class="backBtn" onclick="page('main')">←</button>
<h2>가격 안내</h2>

<p>
선불 : 미네랄 3000만<br>
후불 : 미네랄 4000만<br><br>

입금 방법<br>
창고 입금<br>
미네랄 선물 (500x6일)<br>
와토 전달
</p>

<h2>프로필 모음집</h2>

<div class="gallery">

<img src="https://i.imgur.com/noDm1CK.gif">
<img src="https://i.imgur.com/n8yic2W.gif">
<img src="https://i.imgur.com/lfcnC8z.gif">
</div>
    
</div>
</div>
<div id="make" class="page">

<div class="card">

<h2>프로필 신청</h2>

<input id="nick" placeholder="닉네임">

<button class="btn" onclick="toggleColor()">
프로필 색상 선택
</button>

<div id="colorBox" style="display:none">

<div class="colors">

<div class="color" style="background:#ff9aa2" onclick="setColor('파스텔 빨강',this)"></div>
<div class="color" style="background:#ffb347" onclick="setColor('파스텔 주황',this)"></div>
<div class="color" style="background:#fff4a3" onclick="setColor('파스텔 노랑',this)"></div>
<div class="color" style="background:#b5ead7" onclick="setColor('파스텔 초록',this)"></div>
<div class="color" style="background:#a0e7e5" onclick="setColor('파스텔 하늘',this)"></div>
<div class="color" style="background:#a0c4ff" onclick="setColor('파스텔 파랑',this)"></div>
<div class="color" style="background:#cdb4db" onclick="setColor('파스텔 보라',this)"></div>
<div class="color" style="background:#ffc6ff" onclick="setColor('파스텔 분홍',this)"></div>
<div class="color" style="background:#000" onclick="setColor('검정',this)"></div>

</div>
    
</div>
선택 색상 : <span id="colorText">없음</span>

<br>

<input type="file" id="file">

<select id="font">
<option>둥글게</option>
<option>날렵하게</option>
<option>얇게</option>
<option>두껍게</option>
</select>

<select id="type">
<option>숲 프로필</option>
<option>와고용 프로필</option>
</select>

<textarea id="request" placeholder="요청사항"></textarea>

<button class="btn" onclick="submitOrder()">
신청하기
</button>

<button class="backBtn" onclick="page('main')">
←
</button>

</div>
</div>

<div id="admin" class="page">
<button class="backBtn" onclick="page('main')">←</button>
<h2 class="title">주문 관리</h2>

<p id="orderCount"></p>

<div id="orders"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyDmu0IcPOpT3t4lCTm4lJSOfputYD1Qrl4",
 authDomain: "profile-order.firebaseapp.com",
 projectId: "profile-order",
 storageBucket: "profile-order.firebasestorage.app",
 messagingSenderId: "809148281864",
 appId: "1:809148281864:web:5bcbe9ffb4fdd544184dbd"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let color="없음"

function page(p){

document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"))
document.getElementById(p).classList.add("active")

if(p==="admin") loadOrders()

}

function toggleColor(){

let b=document.getElementById("colorBox")
b.style.display=b.style.display==="none"?"block":"none"

}

function setColor(c,el){

color=c
document.getElementById("colorText").innerText=c

document.querySelectorAll(".color").forEach(e=>{
e.classList.remove("selected")
})

el.classList.add("selected")

}

async function submitOrder(){

let nick=document.getElementById("nick").value
let file=document.getElementById("file").files[0]

if(!nick){
alert("닉네임 입력해주세요")
return
}

if(!file){
alert("⚠️ 프로필 제작할 파일을 선택해야 합니다!")
return
}

if(file.size > 50*1024*1024){
alert("파일은 50MB 이하만 가능합니다")
return
}

if(!file.type.startsWith("image") && !file.type.startsWith("video")){
alert("이미지 또는 영상만 업로드 가능합니다")
return
}

document.getElementById("loading").style.display="flex"

try{

let formData=new FormData()
formData.append("file",file)
formData.append("upload_preset","oiactlgf")

let res=await fetch("https://api.cloudinary.com/v1_1/dni642dal/upload",{
method:"POST",
body:formData
})

let data=await res.json()

if(!data.secure_url){
throw new Error("업로드 실패")
}

let fileUrl=data.secure_url

await db.collection("orders").add({
nick:nick,
color:color,
font:document.getElementById("font").value,
type:document.getElementById("type").value,
request:document.getElementById("request").value,
file:fileUrl,
time:new Date().toLocaleString()
})

alert("신청 완료!")
page("main")

}catch(err){

console.error(err)
alert("업로드 실패했습니다. 다시 시도해주세요.")

}

document.getElementById("loading").style.display="none"

}

function adminLogin(){

let pw=prompt("관리자 비밀번호")

if(pw==="0915") page("admin")
else alert("비밀번호 틀림")

}

async function loadOrders(){

let snapshot=await db.collection("orders").get()

let html=""

document.getElementById("orderCount").innerText="현재 주문 : "+snapshot.size+"개"

snapshot.forEach(doc=>{

let o=doc.data()

let preview=""

if(o.file && (o.file.includes(".mp4") || o.file.includes(".webm") || o.file.includes(".mov"))){
preview=`<video src="${o.file}" controls></video>`
}else{
preview=`<img src="${o.file}">`
}

html+=`

<div class="order">

닉네임 : ${o.nick}<br>
색상 : ${o.color}<br>
글씨체 : ${o.font}<br>
프로필 : ${o.type}<br>
요청 : ${o.request}<br>

<div class="preview">
${preview}
</div>

<button class="btn" onclick="completeOrder('${doc.id}')">
완료
</button>

</div>

`

})

document.getElementById("orders").innerHTML=html

}

async function completeOrder(id){

await db.collection("orders").doc(id).delete()

loadOrders()

}

</script>

</body>
</html>
