<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로필 제작</title>

<style>

body{
background:#000;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
padding:20px;
}

/* 네온 버튼 */

.neonBtn{
display:block;
width:260px;
margin:15px auto;
padding:15px;
border:2px solid #00ffff;
color:#00ffff;
background:transparent;
font-size:18px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px #00ffff;
}

.neonBtn:hover{
background:#00ffff;
color:black;
box-shadow:0 0 25px #00ffff;
}

/* 페이지 */

.page{
display:none;
}

.active{
display:block;
}

/* 색상 */

.colorBox{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.color{
width:40px;
height:40px;
margin:5px;
border-radius:6px;
cursor:pointer;
border:2px solid white;
}

/* 입력 */

input,select,textarea{
margin:10px;
padding:10px;
border-radius:8px;
border:none;
}

textarea{
width:80%;
height:100px;
}

/* 갤러리 */

.gallery img{
width:160px;
margin:10px;
border-radius:10px;
box-shadow:0 0 15px #00ffff;
}

.orderBox{
border:1px solid #00ffff;
padding:10px;
margin:10px;
}

</style>
</head>

<body>

<!-- 메인 -->

<div id="main" class="page active">

<h1>프로필 제작</h1>

<button class="neonBtn" onclick="goPage('make')">
프로필 만들러가기
</button>

<button class="neonBtn" onclick="goPage('price')">
프로필 가격 및 모음집
</button>

<button class="neonBtn" onclick="adminLogin()">
관리자 페이지
</button>

</div>

<!-- 신청 -->

<div id="make" class="page">

<h2>프로필 신청</h2>

닉네임<br>
<input id="nickname" placeholder="닉네임 입력">

<br>

<button class="neonBtn" onclick="toggleColor()">
프로필 색상 선택
</button>

<div id="colorArea" style="display:none">

<div class="colorBox">

<div class="color" style="background:red" onclick="setColor('빨강')"></div>
<div class="color" style="background:orange" onclick="setColor('주황')"></div>
<div class="color" style="background:yellow" onclick="setColor('노랑')"></div>
<div class="color" style="background:green" onclick="setColor('초록')"></div>
<div class="color" style="background:blue" onclick="setColor('파랑')"></div>
<div class="color" style="background:purple" onclick="setColor('보라')"></div>
<div class="color" style="background:pink" onclick="setColor('핑크')"></div>

</div>

</div>

선택 색상 : <span id="colorText">없음</span>

<br><br>

영상 / 이미지 업로드<br>

<input type="file">

<br>

글씨체 선택

<br>

<select id="font">

<option>둥글게</option>
<option>날렵하게</option>
<option>얇게</option>
<option>두껍게</option>

</select>

<br>

프로필 종류

<br>

<select id="type">

<option>숲 프로필</option>
<option>와고용 프로필</option>

</select>

<br>

요청사항

<br>

<textarea id="request"></textarea>

<br>

<button class="neonBtn" onclick="submitOrder()">
신청하기
</button>

<button class="neonBtn" onclick="goPage('main')">
뒤로가기
</button>

</div>


<!-- 가격 -->

<div id="price" class="page">

<h2>프로필 가격 안내</h2>

<p>

안녕하세요 😊

<br><br>

프로필 가격은

<br><br>

선불 : 미네랄 3000만  
후불 : 미네랄 4000만

<br><br>

입니다.

</p>

<p>

입금 방법은 총 3가지입니다.

<br><br>

1️⃣ 창고 입금  
2️⃣ 미네랄 선물 (500 × 6일)  
3️⃣ 와토 전달

</p>

<h2>프로필 모음집</h2>

<div class="gallery">

<img src="profile1.gif">
<img src="profile2.gif">
<img src="profile3.gif">

</div>

<button class="neonBtn" onclick="goPage('main')">
뒤로가기
</button>

</div>


<!-- 관리자 -->

<div id="admin" class="page">

<h2>신청 목록</h2>

<div id="orderList"></div>

<button class="neonBtn" onclick="goPage('main')">
뒤로가기
</button>

</div>

<script>

let selectedColor="없음"

function goPage(page){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(page).classList.add("active")

if(page==="admin") loadOrders()

}

function toggleColor(){

let area=document.getElementById("colorArea")

area.style.display=area.style.display==="none"?"block":"none"

}

function setColor(c){

selectedColor=c

document.getElementById("colorText").innerText=c

}

function submitOrder(){

let nickname=document.getElementById("nickname").value
let font=document.getElementById("font").value
let type=document.getElementById("type").value
let request=document.getElementById("request").value

if(nickname===""){

alert("닉네임을 입력해주세요")
return

}

let order={

nickname,
color:selectedColor,
font,
type,
request,
time:new Date().toLocaleString()

}

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

orders.push(order)

localStorage.setItem("orders",JSON.stringify(orders))

alert("신청이 접수되었습니다!")

goPage("main")

}

function adminLogin(){

let pw=prompt("관리자 비밀번호")

if(pw==="1234"){

goPage("admin")

}else{

alert("비밀번호 틀림")

}

}

function loadOrders(){

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

let html=""

orders.reverse().forEach(o=>{

html+=`

<div class="orderBox">

닉네임 : ${o.nickname}<br>
색상 : ${o.color}<br>
글씨체 : ${o.font}<br>
프로필 종류 : ${o.type}<br>
요청사항 : ${o.request}<br>
신청시간 : ${o.time}

</div>

`

})

document.getElementById("orderList").innerHTML=html

}

</script>

</body>
</html>
