<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>프로필 제작</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Nunito',sans-serif;
}

body{
margin:0;
background:linear-gradient(180deg,#0f0f1a,#1b1b2f);
color:white;
text-align:center;
}

/* 제목 */

.title{

font-size:42px;
margin-top:40px;

color:#ff7ac8;

text-shadow:0 0 10px rgba(255,122,200,0.5);

}

/* 버튼 */

.btn{

display:block;

width:260px;

margin:15px auto;

padding:16px;

border-radius:40px;

background:#ff7ac8;

color:white;

font-size:18px;

border:none;

cursor:pointer;

transition:0.25s;

box-shadow:0 8px 20px rgba(255,122,200,0.4);

}

.btn:hover{

transform:translateY(-3px);

box-shadow:0 12px 25px rgba(255,122,200,0.6);

}

/* 페이지 */

.page{
display:none;
padding:30px;
}

.active{
display:block;
}

/* 카드 */

.card{

background:#1e1e35;

padding:20px;

border-radius:20px;

margin:15px auto;

max-width:500px;

box-shadow:0 10px 25px rgba(0,0,0,0.4);

}

/* 입력 */

input,select,textarea{

width:80%;

padding:12px;

margin:8px;

border-radius:15px;

border:none;

font-size:15px;

}

textarea{
height:90px;
}

/* 색상 */

.colors{

display:flex;

justify-content:center;

flex-wrap:wrap;

}

.color{

width:40px;

height:40px;

margin:6px;

border-radius:10px;

cursor:pointer;

border:2px solid white;

}

/* 갤러리 */

.gallery img{

width:150px;

margin:10px;

border-radius:15px;

}

/* 관리자 주문 */

.order{

background:#222242;

padding:15px;

border-radius:15px;

margin:15px auto;

max-width:500px;

}

.preview img{

max-width:200px;

margin-top:10px;

border-radius:10px;

}

video{

max-width:200px;

margin-top:10px;

}

</style>
</head>

<body>

<div id="main" class="page active">

<h1 class="title">프로필 제작</h1>

<button class="btn" onclick="page('make')">
프로필 만들러가기
</button>

<button class="btn" onclick="page('price')">
가격 및 모음집
</button>

<button class="btn" onclick="adminLogin()">
관리자
</button>

</div>

<!-- 신청 -->

<div id="make" class="page">

<div class="card">

<h2>프로필 신청</h2>

<input id="nick" placeholder="닉네임">

<button class="btn" onclick="toggleColor()">
프로필 색상 선택
</button>

<div id="colorBox" style="display:none">

<div class="colors">

<div class="color" style="background:red" onclick="setColor('빨강')"></div>
<div class="color" style="background:orange" onclick="setColor('주황')"></div>
<div class="color" style="background:yellow" onclick="setColor('노랑')"></div>
<div class="color" style="background:green" onclick="setColor('초록')"></div>
<div class="color" style="background:blue" onclick="setColor('파랑')"></div>
<div class="color" style="background:purple" onclick="setColor('보라')"></div>

</div>

</div>

선택 색상 : <span id="colorText">없음</span>

<br>

<input type="file" id="file">

<select id="font">

<option>둥글게</option>
<option>날렵하게</option>
<option>얇게</option>
<option>두껍게</option>

</select>

<select id="type">

<option>숲 프로필</option>
<option>와고용 프로필</option>

</select>

<textarea id="request" placeholder="요청사항"></textarea>

<button class="btn" onclick="submitOrder()">
신청하기
</button>

<button class="btn" onclick="page('main')">
뒤로가기
</button>

</div>

</div>

<!-- 가격 -->

<div id="price" class="page">

<div class="card">

<h2>가격 안내</h2>

<p>

선불 : 미네랄 3000만  
<br>
후불 : 미네랄 4000만

<br><br>

입금 방법

<br>

창고 입금  
<br>
미네랄 선물 (500x6일)  
<br>
와토 전달

</p>

<h2>프로필 모음집</h2>

<div class="gallery">

<img src="profile1.gif">
<img src="profile2.gif">
<img src="profile3.gif">

</div>

<button class="btn" onclick="page('main')">
뒤로가기
</button>

</div>

</div>

<!-- 관리자 -->

<div id="admin" class="page">

<h2 class="title">주문 관리</h2>

<p id="orderCount"></p>

<div id="orders"></div>

<button class="btn" onclick="page('main')">
뒤로가기
</button>

</div>

<script>

let color="없음"

function page(p){

document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"))
document.getElementById(p).classList.add("active")

if(p==="admin") loadOrders()

}

function toggleColor(){

let b=document.getElementById("colorBox")

b.style.display=b.style.display==="none"?"block":"none"

}

function setColor(c){

color=c
document.getElementById("colorText").innerText=c

}

function submitOrder(){

let file=document.getElementById("file").files[0]

let reader=new FileReader()

reader.onload=function(){

let order={

nick:document.getElementById("nick").value,
color:color,
font:document.getElementById("font").value,
type:document.getElementById("type").value,
request:document.getElementById("request").value,
file:reader.result,
time:new Date().toLocaleString()

}

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

orders.push(order)

localStorage.setItem("orders",JSON.stringify(orders))

alert("신청 완료!")

page("main")

}

if(file) reader.readAsDataURL(file)

}

function adminLogin(){

let pw=prompt("관리자 비밀번호")

if(pw==="0915") page("admin")

else alert("비밀번호 틀림")

}

function loadOrders(){

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

document.getElementById("orderCount").innerText="현재 주문 : "+orders.length+"개"

let html=""

orders.forEach((o,i)=>{

html+=`

<div class="order">

닉네임 : ${o.nick}<br>
색상 : ${o.color}<br>
글씨체 : ${o.font}<br>
프로필 : ${o.type}<br>
요청 : ${o.request}<br>

<div class="preview">

<img src="${o.file}">

</div>

<button class="btn" onclick="completeOrder(${i})">
완료
</button>

</div>

`

})

document.getElementById("orders").innerHTML=html

}

function completeOrder(i){

let orders=JSON.parse(localStorage.getItem("orders")||"[]")

orders.splice(i,1)

localStorage.setItem("orders",JSON.stringify(orders))

loadOrders()

}

</script>

</body>
</html>
