<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>프로필 제작</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Jua',sans-serif;
}

body{
margin:0;
min-height:100vh;
color:#333;
text-align:center;

background:
linear-gradient(120deg,#f8f6f2 0%,#f1ede7 40%,#ffffff 100%),
radial-gradient(circle at 30% 30%,rgba(255,182,193,0.15),transparent 60%),
radial-gradient(circle at 70% 70%,rgba(200,200,200,0.15),transparent 60%);

overflow-x:hidden;
}

.title{
font-size:42px;
margin-top:40px;
color:#dba3b0;
text-shadow:0 0 10px rgba(255,182,193,0.6);
}

.btn{
display:block;
width:260px;
margin:15px auto;
padding:16px;
border-radius:40px;
border:none;
background:linear-gradient(145deg,#f3ede5,#e6dfd5);
cursor:pointer;
}

.backBtn{
position:absolute;
top:10px;
left:10px;
padding:4px 10px;
font-size:12px;
border-radius:20px;
border:none;
opacity:0.85;
cursor:pointer;
}

.page{display:none;padding:30px;}
.active{display:block;}

.card{
background:#fff;
padding:30px;
border-radius:20px;
margin:20px auto;
max-width:500px;
}

input,select,textarea{
width:85%;
padding:14px;
margin:10px;
border-radius:14px;
border:1px solid #ddd;
}

.colors{display:flex;flex-wrap:wrap;justify-content:center;}

.color{
width:40px;height:40px;margin:6px;
border-radius:10px;cursor:pointer;
border:2px solid #fff;
}

.color.selected{
box-shadow:0 0 15px #ff7ac8, 0 0 30px #ff7ac8;
transform:scale(1.2);
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.gallery img{
width:90px;
height:90px;
margin:8px;
border-radius:12px;
object-fit:cover;
display:inline-block;
}

#loading{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:999;
justify-content:center;
align-items:center;
flex-direction:column;
color:#fff;
}

.loader{
width:60px;height:60px;
border:6px solid #ffffff33;
border-top:6px solid #ff7ac8;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div id="loading">
<div class="loader"></div>
업로드중...
</div>

<div id="main" class="page active">
<h1 class="title">✨ 프로필 제작소 ✨</h1>

<button class="btn" onclick="page('make')">프로필 만들기</button>
<button class="btn" onclick="page('price')">가격 & 모음집</button>
<button class="btn" onclick="adminLogin()">관리자</button>
</div>

<div id="price" class="page">
<div class="card">

<h2>가격 안내</h2>
<p>
선불 : 미네랄 3000만<br>
후불 : 미네랄 4000만
</p>

<h2>프로필 모음집</h2>

<div class="gallery">
<img src="https://i.imgur.com/noDm1CK.gif">
<img src="https://i.imgur.com/n8yic2W.gif">
<img src="https://i.imgur.com/lfcnC8z.gif">
</div>

<button class="backBtn" onclick="page('main')">←</button>

</div>
</div>

<div id="make" class="page">
<div class="card">

<h2>프로필 신청</h2>

<input id="nick" placeholder="닉네임">

<button class="btn" onclick="toggleColor()">색상 선택</button>

<div id="colorBox" style="display:none">
<div class="colors">

<div class="color" style="background:#ff9aa2" onclick="setColor('빨강',this)"></div>
<div class="color" style="background:#a0c4ff" onclick="setColor('파랑',this)"></div>
<div class="color" style="background:#ffc6ff" onclick="setColor('핑크',this)"></div>

</div>
</div>

선택 색상 : <span id="colorText">없음</span>

<input type="file" id="file">
<p id="warn" style="color:red;"></p>

<select id="font">
<option>둥글게</option>
<option>얇게</option>
</select>

<textarea id="request" placeholder="요청사항"></textarea>

<button class="btn" onclick="submitOrder()">신청하기</button>

<button class="backBtn" onclick="page('main')">←</button>

</div>
</div>

<div id="admin" class="page">
<h2>관리자</h2>
<div id="orders"></div>
<button onclick="page('main')">뒤로가기</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyDmu0IcPOpT3t4lCTm4lJSOfputYD1Qrl4",
 authDomain: "profile-order.firebaseapp.com",
 projectId: "profile-order"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let color="없음"

function page(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"))
document.getElementById(p).classList.add("active")
if(p==="admin") loadOrders()
}

function toggleColor(){
let b=document.getElementById("colorBox")
b.style.display=b.style.display==="none"?"block":"none"
}

function setColor(c,el){
color=c
document.getElementById("colorText").innerText=c
document.querySelectorAll(".color").forEach(e=>e.classList.remove("selected"))
el.classList.add("selected")
}

async function submitOrder(){

let nick=document.getElementById("nick").value
let file=document.getElementById("file").files[0]
let warn=document.getElementById("warn")

warn.innerText=""

if(!nick){
warn.innerText="닉네임 입력해주세요"
return
}

if(!file){
warn.innerText="파일 선택 필수!"
return
}

document.getElementById("loading").style.display="flex"

let formData=new FormData()
formData.append("file",file)
formData.append("upload_preset","oiactlgf")

let res=await fetch("https://api.cloudinary.com/v1_1/dni642dal/upload",{method:"POST",body:formData})
let data=await res.json()

await db.collection("orders").add({
nick,color,file:data.secure_url
})

alert("완료!")
page("main")
document.getElementById("loading").style.display="none"
}

// 🔥 GIF 로고
document.querySelectorAll(".gallery img").forEach(img=>{
let wrap=document.createElement("div")
wrap.style.position="relative"
wrap.style.display="inline-block"
img.parentNode.insertBefore(wrap,img)
wrap.appendChild(img)

let logo=document.createElement("div")
logo.innerText="뿔링뿔링"
logo.style.position="absolute"
logo.style.bottom="5px"
logo.style.right="5px"
logo.style.fontSize="10px"
logo.style.background="rgba(0,0,0,0.5)"
logo.style.color="#fff"
logo.style.padding="2px 6px"
logo.style.borderRadius="10px"

wrap.appendChild(logo)
})

</script>

</body>
</html>
