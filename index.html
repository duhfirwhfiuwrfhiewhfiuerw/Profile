<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>프로필 제작</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:'Jua',sans-serif;
}

body{
margin:0;
background:radial-gradient(circle at top,#1f1f3b,#0b0b17);
color:white;
text-align:center;
min-height:100vh;
}

.title{
font-size:42px;
margin-top:40px;
color:#ff7ac8;
text-shadow:0 0 15px rgba(255,122,200,0.8);
}

.btn{
display:block;
width:260px;
margin:15px auto;
padding:16px;
border-radius:40px;
background:linear-gradient(45deg,#ff7ac8,#ff3b8d);
color:white;
font-size:18px;
border:none;
cursor:pointer;
transition:0.25s;
box-shadow:0 8px 25px rgba(255,122,200,0.6);
}

.btn:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:0 15px 35px rgba(255,122,200,0.8);
}

.page{
display:none;
padding:30px;
}

.active{
display:block;
}

.card{
background:rgba(30,30,53,0.85);
backdrop-filter:blur(10px);
padding:25px;
border-radius:25px;
margin:15px auto;
max-width:520px;
box-shadow:0 15px 35px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.08);
}

input,select,textarea{
width:80%;
padding:12px;
margin:8px;
border-radius:15px;
border:none;
font-size:15px;
}

textarea{
height:90px;
}

.colors{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.color{
width:40px;
height:40px;
margin:6px;
border-radius:10px;
cursor:pointer;
border:2px solid white;
}

.order{
background:#222242;
padding:15px;
border-radius:15px;
margin:15px auto;
max-width:500px;
}

.preview img,video{
max-width:200px;
margin-top:10px;
border-radius:10px;
}

#loading{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
z-index:999;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:22px;
}

.loader{
width:60px;
height:60px;
border:6px solid #ffffff33;
border-top:6px solid #ff7ac8;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:20px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

 .gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
margin-top:20px;
}

.gallery img{
width:180px;
height:180px;
object-fit:cover;
margin:10px;
border-radius:15px;
}
.gallery img:hover{
transform:scale(1.08);
box-shadow:0 12px 30px rgba(255,122,200,0.6);
}
</style>
</head>

<body>

<div id="loading">
<div class="loader"></div>
잠시만 기다려주세요...
</div>

<div id="main" class="page active">

<h1 class="title">프로필 제작</h1>

<button class="btn" onclick="page('make')">
프로필 만들러가기
</button>

<button class="btn" onclick="page('price')">
가격 및 모음집
</button>

<button class="btn" onclick="adminLogin()">
관리자
</button>

</div>
<div id="price" class="page">

<div class="card">

<h2>가격 안내</h2>

<p>
선불 : 미네랄 3000만<br>
후불 : 미네랄 4000만<br><br>

입금 방법<br>
창고 입금<br>
미네랄 선물 (500x6일)<br>
와토 전달
</p>

<h2>프로필 모음집</h2>

<div class="gallery">

<img src="https://i.imgur.com/noDm1CK.gif">
<img src="https://i.imgur.com/n8yic2W.gif">
<img src="https://i.imgur.com/lfcnC8z.gif">

</div>
<button class="btn" onclick="page('main')">
뒤로가기
</button>

</div>
</div>
<div id="make" class="page">

<div class="card">

<h2>프로필 신청</h2>

<input id="nick" placeholder="닉네임">

<button class="btn" onclick="toggleColor()">
프로필 색상 선택
</button>

<div id="colorBox" style="display:none">

<div class="colors">

<div class="color" style="background:#ff3b3b" onclick="setColor('빨강')"></div>
<div class="color" style="background:#ff8c1a" onclick="setColor('주황')"></div>
<div class="color" style="background:#ffd500" onclick="setColor('노랑')"></div>
<div class="color" style="background:#32d74b" onclick="setColor('초록')"></div>
<div class="color" style="background:#3b82ff" onclick="setColor('파랑')"></div>
<div class="color" style="background:#004cff" onclick="setColor('남색')"></div>
<div class="color" style="background:#8b5cf6" onclick="setColor('보라')"></div>
<div class="color" style="background:#ff7ac8" onclick="setColor('핑크')"></div>
<div class="color" style="background:black" onclick="setColor('검정')"></div>

</div>
</div>

선택 색상 : <span id="colorText">없음</span>

<br>

<input type="file" id="file">

<select id="font">
<option>둥글게</option>
<option>날렵하게</option>
<option>얇게</option>
<option>두껍게</option>
</select>

<select id="type">
<option>숲 프로필</option>
<option>와고용 프로필</option>
</select>

<textarea id="request" placeholder="요청사항"></textarea>

<button class="btn" onclick="submitOrder()">
신청하기
</button>

<button class="btn" onclick="page('main')">
뒤로가기
</button>

</div>
</div>

<div id="admin" class="page">

<h2 class="title">주문 관리</h2>

<p id="orderCount"></p>

<div id="orders"></div>

<button class="btn" onclick="page('main')">
뒤로가기
</button>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
 apiKey: "AIzaSyDmu0IcPOpT3t4lCTm4lJSOfputYD1Qrl4",
 authDomain: "profile-order.firebaseapp.com",
 projectId: "profile-order",
 storageBucket: "profile-order.firebasestorage.app",
 messagingSenderId: "809148281864",
 appId: "1:809148281864:web:5bcbe9ffb4fdd544184dbd"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let color="없음"

function page(p){

document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"))
document.getElementById(p).classList.add("active")

if(p==="admin") loadOrders()

}

function toggleColor(){

let b=document.getElementById("colorBox")
b.style.display=b.style.display==="none"?"block":"none"

}

function setColor(c){

color=c
document.getElementById("colorText").innerText=c

}

async function submitOrder(){

let nick=document.getElementById("nick").value
let file=document.getElementById("file").files[0]

if(!nick){
alert("닉네임 입력해주세요")
return
}

if(!file){
alert("파일 선택해주세요")
return
}

if(file.size > 50*1024*1024){
alert("파일은 50MB 이하만 가능합니다")
return
}

if(!file.type.startsWith("image") && !file.type.startsWith("video")){
alert("이미지 또는 영상만 업로드 가능합니다")
return
}

document.getElementById("loading").style.display="flex"

try{

let formData=new FormData()
formData.append("file",file)
formData.append("upload_preset","oiactlgf")

let res=await fetch("https://api.cloudinary.com/v1_1/dni642dal/upload",{
method:"POST",
body:formData
})

let data=await res.json()

if(!data.secure_url){
throw new Error("업로드 실패")
}

let fileUrl=data.secure_url

await db.collection("orders").add({
nick:nick,
color:color,
font:document.getElementById("font").value,
type:document.getElementById("type").value,
request:document.getElementById("request").value,
file:fileUrl,
time:new Date().toLocaleString()
})

alert("신청 완료!")
page("main")

}catch(err){

console.error(err)
alert("업로드 실패했습니다. 다시 시도해주세요.")

}

document.getElementById("loading").style.display="none"

}

function adminLogin(){

let pw=prompt("관리자 비밀번호")

if(pw==="0915") page("admin")
else alert("비밀번호 틀림")

}

async function loadOrders(){

let snapshot=await db.collection("orders").get()

let html=""

document.getElementById("orderCount").innerText="현재 주문 : "+snapshot.size+"개"

snapshot.forEach(doc=>{

let o=doc.data()

let preview=""

if(o.file && (o.file.includes(".mp4") || o.file.includes(".webm") || o.file.includes(".mov"))){
preview=`<video src="${o.file}" controls></video>`
}else{
preview=`<img src="${o.file}">`
}

html+=`

<div class="order">

닉네임 : ${o.nick}<br>
색상 : ${o.color}<br>
글씨체 : ${o.font}<br>
프로필 : ${o.type}<br>
요청 : ${o.request}<br>

<div class="preview">
${preview}
</div>

<button class="btn" onclick="completeOrder('${doc.id}')">
완료
</button>

</div>

`

})

document.getElementById("orders").innerHTML=html

}

async function completeOrder(id){

await db.collection("orders").doc(id).delete()

loadOrders()

}

</script>

</body>
</html>
